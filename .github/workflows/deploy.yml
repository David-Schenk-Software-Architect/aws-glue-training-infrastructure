name: Deploy Infrastructure

# Push to main => full deploy (apply). Pull request to main => plan only (review gate).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Never let two runs apply the same remote state at once.
concurrency:
  group: tofu-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: OpenTofu ${{ github.event_name == 'push' && 'apply' || 'plan' }}
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
      AWS_REGION: ${{ vars.AWS_DEFAULT_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.12.3

      - name: Verify target AWS account
        run: |
          ACTUAL=$(aws sts get-caller-identity --query Account --output text)
          if [ "$ACTUAL" != "${{ secrets.AWS_ACCOUNT_ID }}" ]; then
            echo "::error::Caller account $ACTUAL != expected ${{ secrets.AWS_ACCOUNT_ID }}"
            exit 1
          fi
          echo "Deploying to account $ACTUAL"

      - name: Tofu init
        run: tofu init -input=false -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}"

      - name: Tofu fmt check
        run: tofu fmt -check -recursive

      - name: Tofu validate
        run: tofu validate

      - name: Tofu plan
        run: tofu plan -input=false -out=tfplan

      - name: Tofu apply
        if: github.event_name == 'push'
        run: tofu apply -input=false -auto-approve tfplan

      # A green apply is not proof the Glue role is usable: an attachment that is not
      # re-planned leaves the role silently unprivileged. Assert the effective
      # permissions instead of trusting the plan.
      - name: Assert Glue role permissions
        if: github.event_name == 'push'
        run: |
          ROLE_ARN=$(tofu output -raw glue_role_arn)
          TRANSFORMS="arn:aws:s3:::aws-glue-studio-transforms-560373232017-prod-${AWS_DEFAULT_REGION}/*"
          FAILED=0
          assert() {
            DECISION=$(aws iam simulate-principal-policy \
              --policy-source-arn "$ROLE_ARN" \
              --action-names "$1" \
              --resource-arns "$2" \
              --query 'EvaluationResults[0].EvalDecision' --output text)
            if [ "$DECISION" != "allowed" ]; then
              echo "::error::$1 on $2 => $DECISION (expected allowed)"
              FAILED=1
            else
              echo "ok: $1 on $2"
            fi
          }
          # Glue Studio data preview / visual editor transforms.
          assert s3:GetObject "$TRANSFORMS"
          # Studio-generated scripts, notebooks and default temp dir.
          assert s3:PutObject "arn:aws:s3:::aws-glue-assets-${{ secrets.AWS_ACCOUNT_ID }}-${AWS_DEFAULT_REGION}/scripts/probe.py"
          # Data lake + catalog + continuous logging.
          assert s3:PutObject "arn:aws:s3:::$(tofu output -raw bucket_name)/processed/probe"
          assert glue:CreateTable "*"
          assert logs:PutLogEvents "arn:aws:logs:${AWS_DEFAULT_REGION}:${{ secrets.AWS_ACCOUNT_ID }}:log-group:/aws-glue/jobs/logs-v2:*"
          exit $FAILED
